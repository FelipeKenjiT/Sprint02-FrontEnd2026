<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/css/estilo.css">
    <title>Zeryon</title>
</head>
<body>
    <div class="celular">
        <div class="configuracoesCima">
            <img src="./src/assets/configuracoes.png" class="Configuracoes">
            <img src="./src/assets/flashPreto.png" class="Flash">
            <img src="./src/assets/relogio.png" class="Relogio">
        </div>
        <img src="./src/assets/fotoNatureza.webp" class="FotoPrincipal">
        <div class="configuracoesBaixo">
            <div class="Modos">
                <p class="Retrato">Retrato</p>
                <p class="Video">Vídeo</p>
                <p class="Foto">Foto</p>
                <p class="Noite">Noite</p>
                <p class="Mais">Mais</p>
            </div>
            <div class="Usabilidades">
                <img src="./src/assets/FotoNaturezaQuadrada.webp" class="FotoAnterior">
                <button class="BotaoFoto"></button>
                <button class="GirarCamera"><img src="./src/assets/VirarCamera.webp" class="GirarCameraImg"></button>
            </div>
        </div>
    </div>
</body>
</html>
